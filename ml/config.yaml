# Paths are resolved relative to the repository root (parent of ml/).
# Defaults suit local Apple Silicon laptops (~8–16 GB RAM). For smaller RAM use ml/config.mac_air.yaml.
ingest:
  # Sample ratings if CSV is very large (full MovieLens can exceed 25M rows).
  max_ratings_rows: 2000000

paths:
  processed_dir: ml/data/processed
  features_dir: ml/data/features
  artifacts_dir: ml/artifacts

datasets:
  movies_metadata: movie_dataset/movies_metadata.csv
  movies_links: movie_dataset/links.csv
  movies_ratings: movie_dataset/ratings.csv
  movies_keywords: movie_dataset/keywords.csv
  music_tracks: music_dataset/data_music.csv
  books: book_dataset/book_data.csv

split:
  val_user_fraction: 0.1
  random_seed: 42

training:
  positive_rating_threshold: 4.0
  negatives_per_positive_movie: 4
  cross_domain_samples_per_user: 20
  bootstrap_weak_positive_threshold: 0.35
  # Subsample users / rows for manageable RAM on a MacBook Air class machine.
  max_users: 18000
  max_movie_rows_per_user: 80
  max_training_rows: 650000

lightgbm:
  objective: binary
  metric: auc
  num_threads: 8
  num_leaves: 63
  learning_rate: 0.05
  feature_fraction: 0.85
  bagging_fraction: 0.85
  bagging_freq: 1
  min_data_in_leaf: 50
  num_boost_round: 500
  early_stopping_rounds: 50

evaluation:
  k_list: [5, 10, 20]
  ranking_candidates_per_user: 100
